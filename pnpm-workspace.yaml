# Supply-chain defense: refuse to install any package version released
# less than 7 days ago.
minimumReleaseAge: 10080

# Refuse install if running Node version doesn't match `engines.node` in package.json.
engineStrict: true

# Refuse install if the active pnpm version doesn't match the `packageManager` field.
pmOnFail: error

allowBuilds:
  esbuild: false
  msw: true
  sharp: true
  unrs-resolver: true
  workerd: true

overrides:
  devalue: 5.7.1
  '@types/node': 25.6.2
  vite: ^7.3.3
  "picomatch@2": ^2.3.2
  lodash: ^4.18.1
  defu: ^6.1.5
  postcss: ^8.5.10
  "js-yaml@3": ^3.14.2

resolutionMode: highest
