# Supply-chain defense: refuse to install any package version released
# less than 7 days ago.
minimumReleaseAge: 10080

allowBuilds:
  esbuild: false
  msw: true
  sharp: true
  unrs-resolver: true
  workerd: true

overrides:
  devalue: ^5.8.1
  vite: ^7.3.3
  "picomatch@2": ^2.3.2
  lodash: ^4.18.1
  defu: ^6.1.5
  postcss: ^8.5.10
  "js-yaml@3": ^3.14.2

resolutionMode: highest
