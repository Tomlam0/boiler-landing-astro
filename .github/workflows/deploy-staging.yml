name: Deploy Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SITE_URL: ${{ vars.SITE_URL_STAGING }}
      SANITY_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
      SANITY_DATASET: ${{ vars.SANITY_DATASET }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Staging is the SSR mirror used by Sanity Presentation for Visual
      # Editing. Pages must stay dynamic so the draft cookie is read on every
      # request — flip the literal `prerender = true` to `false` in every
      # page before the build. Astro requires a static literal, hence the sed
      # substitution rather than an env var.
      - name: Switch pages to SSR mode
        run: |
          find src/pages -type f \( -name "*.astro" -o -name "*.ts" \) \
            -exec sed -i 's/^export const prerender = true;$/export const prerender = false;/g' {} +

      - name: Build
        run: pnpm build

      - name: Upload Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cat > /tmp/secrets.json <<'JSONEOF'
          {
            "SANITY_API_READ_TOKEN": ${{ toJSON(secrets.SANITY_API_READ_TOKEN) }},
            "SANITY_REVALIDATE_SECRET": ${{ toJSON(secrets.SANITY_REVALIDATE_SECRET) }},
            "REPO_DISPATCH_TOKEN": ${{ toJSON(secrets.REPO_DISPATCH_TOKEN) }},
            "GITHUB_REPO": ${{ toJSON(github.repository) }}
          }
          JSONEOF
          pnpm exec wrangler secret bulk --name landing-astro-staging /tmp/secrets.json
          rm -f /tmp/secrets.json

      - name: Deploy to Cloudflare Workers
        run: pnpm exec wrangler deploy --name landing-astro-staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Sanity Studio (staging)
        env:
          # Dedicated token with the `sanity.project.deployStudio` grant
          # (the regular SANITY_API_TOKEN only has data read/write rights)
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_DEPLOY_STUDIO_TOKEN }}
          SITE_URL_STAGING: ${{ vars.SITE_URL_STAGING }}
        run: pnpm deploy:sanity:staging
